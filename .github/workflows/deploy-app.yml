# Deploys the OneShot web app to Vercel on every push to main
#
# Setup required (one time):
#   1. vercel.com → New Project → import your repo
#   2. Add secrets to GitHub:
#      - VERCEL_TOKEN  (Account Settings → Tokens)
#      - VERCEL_ORG_ID  (from .vercel/project.json after first deploy)
#      - VERCEL_PROJECT_ID  (from .vercel/project.json)

name: Deploy App to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "### Deployed to Vercel ✅" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
